# OpenSpec Configuration — recipe-book-app
# Auto-generated by sdd-init. Do not edit manually unless you understand the full SDD contract.

context: |
  Next.js 16 frontend app (app router) for a recipe book. React 19, Tailwind CSS v4,
  daisyUI 5 for UI components, TanStack Query 5 for data fetching. Spanish product UI,
  English secondary. Package manager: pnpm. Strict TDD enforced for all implementation.

strict_tdd: true

languages:
  default: es
  secondary: en

testing:
  runner:
    command: pnpm test
    framework: vitest 4.1.9
    config: vitest.config.ts
    setup: vitest.setup.ts
  layers:
    unit:
      available: true
      tool: vitest + @testing-library/react + @testing-library/jest-dom
      directory: tests/unit
    integration:
      available: true
      tool: vitest + msw 2.14.6
    e2e:
      available: true
      tool: playwright 1.61.1
      directory: tests/e2e
      config: playwright.config.ts
      projects:
        - chromium
  coverage:
    available: true
    command: vitest --coverage
    provider: v8
  quality:
    linter:
      available: true
      command: pnpm lint
      tool: eslint 9 + eslint-config-next (core-web-vitals + typescript)
    type_checker:
      available: true
      command: tsc --noEmit
      tool: typescript 5 (strict)
    formatter:
      available: false
      reason: No formatter configured. Consider adding Prettier or Biome.

phases:
  propose:
    max_tokens: 2000
  spec:
    max_tokens: 4000
  design:
    max_tokens: 4000
  tasks:
    max_tokens: 2000
  apply:
    max_tokens: 8000
    strict_tdd: true
  verify:
    max_tokens: 4000
    strict_tdd: true
  archive:
    max_tokens: 2000

# PR strategy: ask-always
# Review budget: 2000 changed lines
# Branch strategy: feature branches with conventional commits
